version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  dashboard-app:
    build: .
    restart: always
    environment:
      - PORT=3001
      - HOSTNAME=0.0.0.0 
      # Tambahkan kutip tunggal di sini supaya password aman
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DATABASE=${CLICKHOUSE_DATABASE}
      - NEXTAUTH_SECRET= eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyAgImV4cCI6IDE0ODUxNDA5ODQsICAiaWF0IjogMTQ4NTEzNzM4NCwgICJpc3MiOiAiQmxhY2tCZXJyeSEwIiwgICJzdWIiOiAiMjlhYzBjMTgtMGI0YS00MmNmLTgyZmMtMDNkNTcwMzE4YTFkIiwgICJhcHBsaWNhdGlvbklkIjogIjc5MTAzNzM0LTk3YWItNGQxYS1hZjM3LWUwMDZkMDVkMjk1MiIsICAicm9sZXMiOiBbXX0=
      - NEXTAUTH_URL= http://localhost:3000
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "3001:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/dashboard.crt:/etc/nginx/ssl/dashboard.crt
      - ./nginx/dashboard.key:/etc/nginx/ssl/dashboard.key
    depends_on:
      - dashboard-app

volumes:
  postgres_data: